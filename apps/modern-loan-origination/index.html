<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NorthBank Loan Origination</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous" />
    <style>
      :root { --nb-blue:#0d3b66; --nb-blue-2:#1e5fa3; --nb-accent:#16a085; }
      body { background: #eef2f7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
      .nb-boot { max-width: 760px; margin: 60px auto; text-align: center; color: #555; }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="nb-boot">
        <h3>Loading NorthBank Lending Workbench...</h3>
        <p>Connecting to decisioning service...</p>
      </div>
    </div>
    <script>
      (function () {
        var host = document.getElementById("app");
        window.setTimeout(function () {
          if (!host || host.querySelector(".nb-shell")) return;
          host.innerHTML =
            '<div class="nb-boot"><h3>Recovery Mode</h3>' +
            '<p>The app did not mount. Try a hard reload or reset local data.</p>' +
            '<button class="btn btn-primary mr-2" id="nb-reload">Hard Reload</button>' +
            '<button class="btn btn-outline-secondary" id="nb-reset">Reset Local Data + Reload</button></div>';
          document.getElementById("nb-reload").onclick = function () { location.reload(); };
          document.getElementById("nb-reset").onclick = function () {
            try { localStorage.removeItem("nb-loan-origination"); } catch (e) {}
            location.reload();
          };
        }, 2800);
      })();
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
