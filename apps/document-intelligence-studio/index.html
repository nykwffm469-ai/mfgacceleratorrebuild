<!doctype html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Document Intelligence Studio</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous" />
<style>body{background:#f4f6f9;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;} .idp-boot{max-width:760px;margin:60px auto;text-align:center;color:#555;}</style></head>
<body><div id="app"><div class="idp-boot"><h3>Loading Document Intelligence Studio...</h3><p>Spinning up classifier and extraction models...</p></div></div>
<script>(function(){var h=document.getElementById("app");window.setTimeout(function(){if(!h||h.querySelector(".idp-shell"))return;h.innerHTML='<div class="idp-boot"><h3>Recovery Mode</h3><button class="btn btn-primary mr-2" id="ip-r">Hard Reload</button><button class="btn btn-outline-secondary" id="ip-x">Reset Local Data + Reload</button></div>';document.getElementById("ip-r").onclick=function(){location.reload();};document.getElementById("ip-x").onclick=function(){try{localStorage.removeItem("idp-studio");}catch(e){}location.reload();};},2800);})();</script>
<script type="module" src="./src/main.js"></script></body></html>
