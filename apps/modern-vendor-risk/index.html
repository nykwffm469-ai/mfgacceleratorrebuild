<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VendorPulse - Risk Cockpit</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous" />
    <style>
      body { background: #f4f6f9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
      .vp-boot { max-width: 760px; margin: 60px auto; text-align: center; color: #555; }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="vp-boot">
        <h3>Loading VendorPulse Risk Cockpit...</h3>
        <p>Connecting to risk scoring engine...</p>
      </div>
    </div>
    <script>
      (function () {
        var host = document.getElementById("app");
        window.setTimeout(function () {
          if (!host || host.querySelector(".vp-shell")) return;
          host.innerHTML =
            '<div class="vp-boot"><h3>Recovery Mode</h3>' +
            '<p>The app did not mount. Try a hard reload or reset local data.</p>' +
            '<button class="btn btn-primary mr-2" id="vp-reload">Hard Reload</button>' +
            '<button class="btn btn-outline-secondary" id="vp-reset">Reset Local Data + Reload</button></div>';
          document.getElementById("vp-reload").onclick = function () { location.reload(); };
          document.getElementById("vp-reset").onclick = function () {
            try { localStorage.removeItem("vp-vendor-risk"); } catch (e) {}
            location.reload();
          };
        }, 2800);
      })();
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
