<!doctype html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>AP/AR Shared Mailbox Bot</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous" />
<style>body{background:#f3f3f3;font-family:"Segoe UI",Tahoma,Arial,sans-serif;font-size:13px;color:#1f1f1f;} .em-boot{max-width:760px;margin:60px auto;text-align:center;color:#555;}</style></head>
<body><div id="app"><div class="em-boot"><h3>Loading AP/AR Shared Mailbox Bot Console...</h3><p>Connecting to Exchange...</p></div></div>
<script>(function(){var h=document.getElementById("app");window.setTimeout(function(){if(!h||h.querySelector(".em-shell"))return;h.innerHTML='<div class="em-boot"><h3>Recovery Mode</h3><button class="btn btn-primary mr-2" id="er">Hard Reload</button><button class="btn btn-outline-secondary" id="ex">Reset Local Data + Reload</button></div>';document.getElementById("er").onclick=function(){location.reload();};document.getElementById("ex").onclick=function(){try{localStorage.removeItem("email-bot");}catch(e){}location.reload();};},2800);})();</script>
<script type="module" src="./src/main.js"></script></body></html>
