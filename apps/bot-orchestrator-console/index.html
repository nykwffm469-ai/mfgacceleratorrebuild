<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bot Orchestrator - Control Room</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous" />
    <style> body { background:#0f1419; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; color:#e4e8ef; } .bo-boot{max-width:760px;margin:60px auto;text-align:center;color:#7d8590;} </style>
  </head>
  <body>
    <div id="app"><div class="bo-boot"><h3>Loading Bot Orchestrator Control Room...</h3><p>Connecting to bot fleet...</p></div></div>
    <script>
      (function(){var h=document.getElementById("app");window.setTimeout(function(){if(!h||h.querySelector(".bo-shell"))return;h.innerHTML='<div class="bo-boot"><h3>Recovery Mode</h3><p>The orchestrator did not mount. Try a hard reload or reset local data.</p><button class="btn btn-primary mr-2" id="bo-r">Hard Reload</button><button class="btn btn-outline-light" id="bo-x">Reset Local Data + Reload</button></div>';document.getElementById("bo-r").onclick=function(){location.reload();};document.getElementById("bo-x").onclick=function(){try{localStorage.removeItem("bot-orchestrator");}catch(e){}location.reload();};},2800);})();
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
